name: SafeToShip
description: Run SafeToShip, a local launch hardening gate for vibe-coded apps.
inputs:
  target:
    description: Directory to scan.
    required: false
    default: "."
  fail-on:
    description: Use "do-not-ship" or "warnings".
    required: false
    default: "do-not-ship"
runs:
  using: composite
  steps:
    - name: Run SafeToShip
      shell: bash
      run: |
        npx safetoship audit "${{ inputs.target }}" \
          --sarif safetoship.sarif \
          --markdown safetoship-report.md \
          --fail-on "${{ inputs.fail-on }}"
