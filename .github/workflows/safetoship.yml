name: SafeToShip

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: node dist/cli.js audit . --exclude fixtures,tests --sarif safetoship.sarif --markdown safetoship-report.md --fail-on do-not-ship
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: safetoship.sarif
      - name: Comment plain-English report on PR
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- safetoship-report -->";
            const report = fs.existsSync("safetoship-report.md")
              ? fs.readFileSync("safetoship-report.md", "utf8")
              : "SafeToShip did not produce a report.";
            const body = `${marker}\n${report.slice(0, 60000)}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safetoship-report
          path: safetoship-report.md
