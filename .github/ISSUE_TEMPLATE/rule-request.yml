name: Rule request
description: Suggest a new SafeToShip launch hardening rule.
title: "[Rule]: "
labels: ["rule-request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What launch risk should this rule catch?
    validations:
      required: true
  - type: textarea
    id: signal
    attributes:
      label: Static signal
      description: What code, config, dependency, or file pattern would SafeToShip detect?
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Expected repair guidance
      description: What should the fix prompt or hardening action tell the builder to do?
    validations:
      required: false
